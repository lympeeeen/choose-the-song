<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай мелодию · Дореволюционный стиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0f1e;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            color: #fff;
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 40%);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            color: #FFD700;
            text-shadow: 0 0 10px #FFA500, 0 0 20px #FF4500;
            margin-bottom: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .big-button {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            background: #FFD700;
            color: #0a0f1e;
            border: 4px solid #fff;
            padding: 20px 50px;
            border-radius: 60px;
            cursor: pointer;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FF8C00;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .big-button:hover {
            background: #FFA500;
            border-color: #FFD700;
            transform: scale(1.05);
            box-shadow: 0 0 30px #FFA500, 0 0 60px #FF4500;
        }

        .game-card {
            width: 100%;
            max-width: 950px;
            background: #1a1f30;
            border: 6px solid #FFD700;
            border-radius: 50px;
            padding: 2rem;
            margin: 1.5rem 0;
            box-shadow: 0 0 30px gold;
        }

        .track-title {
            font-size: 2.2rem;
            color: #FFD700;
            margin-bottom: 2rem;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 8px orange;
        }

        .voice-message {
            background: #2a2f40;
            border-radius: 60px;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            border: 3px solid #FFD700;
            margin-bottom: 2rem;
            box-shadow: inset 0 0 15px rgba(255,215,0,0.3);
            flex-wrap: wrap;
        }

        .voice-icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 5px cyan);
        }

        .play-button {
            background: #FFD700;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 2rem;
            font-weight: 700;
            color: #0a0f1e;
            cursor: pointer;
            box-shadow: 0 0 15px gold;
            transition: 0.2s;
            border: 2px solid white;
            min-width: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .play-button:hover {
            background: #FFA500;
            transform: scale(1.02);
        }

        .play-button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .timer {
            font-size: 3rem;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 10px red;
            background: #0a0f1e;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            border: 3px solid #FFD700;
            margin-left: auto;
            font-variant-numeric: tabular-nums;
        }

        .next-button {
            background: #FFD700;
            border: none;
            border-radius: 50px;
            padding: 1.5rem 3rem;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0a0f1e;
            cursor: pointer;
            margin-top: 1.5rem;
            box-shadow: 0 0 20px gold;
            width: 100%;
            border: 3px solid white;
            transition: 0.2s;
        }

        .next-button:hover {
            background: #FFA500;
            transform: scale(1.02);
        }

        .footer {
            margin-top: 3rem;
            color: #aaa;
            font-size: 1.2rem;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2.5rem; }
            .big-button { font-size: 1.5rem; padding: 15px 30px; }
            .game-card { padding: 1.5rem; }
            .track-title { font-size: 1.8rem; }
            .voice-message { flex-direction: column; align-items: stretch; }
            .play-button { width: 100%; }
            .timer { margin-left: 0; text-align: center; }
            .next-button { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <h1>🎵 УГАДАЙ МЕЛОДИЮ 🎶</h1>

    <!-- Экран приветствия -->
    <div id="startScreen" style="display: block; text-align: center;">
        <button class="big-button" id="startGameBtn">▶ НАЧАТЬ ИГРУ</button>
        <div style="font-size: 1.8rem; color: #ccc; margin-top: 2rem;">Слушайте отрывки без слов,<br>потом со словами</div>
    </div>

    <!-- Игровой экран -->
    <div id="gameScreen" style="display: none; width: 100%; max-width: 1000px;">
        <div id="gameCard" class="game-card">
            <div class="track-title" id="trackName">🎼 Трек <span id="currentTrackIndexSpan">1</span>/<span id="totalTracksSpan"></span></div>

            <!-- Плеер без слов -->
            <div class="voice-message">
                <span class="voice-icon">🎤</span>
                <button class="play-button" id="playWithoutBtn">▶ Без слов</button>
                <div class="timer" id="timerDisplay">20</div>
            </div>

            <!-- Плеер со словами -->
            <div class="voice-message">
                <span class="voice-icon">🎙️</span>
                <button class="play-button" id="playWithBtn">▶ Со словами</button>
            </div>

            <!-- Кнопка следующего трека -->
            <button class="next-button" id="nextTrackBtn">⏩ СЛЕДУЮЩИЙ ТРЕК</button>
        </div>
    </div>

    <!-- Экран окончания игры -->
    <div id="finalScreen" style="display: none; text-align: center;">
        <div class="game-card">
            <div class="track-title" style="font-size: 3rem;">🏆 ИГРА ОКОНЧЕНА 🏆</div>
            <div style="font-size: 2.5rem; color: #FFD700; margin: 2rem 0;">Вы прослушали все треки!</div>
            <button class="big-button" id="playAgainBtn">🔄 Сыграть ещё</button>
        </div>
    </div>

    <script>
        (function() {
            // -------- НАСТРОЙКИ --------
            const TOTAL_TRACKS = 10; // сколько песен в папках (1.mp3 ... 10.mp3)

            // Элементы интерфейса
            const startScreen = document.getElementById('startScreen');
            const gameScreen = document.getElementById('gameScreen');
            const finalScreen = document.getElementById('finalScreen');
            const startBtn = document.getElementById('startGameBtn');
            const playAgainBtn = document.getElementById('playAgainBtn');
            const trackIndexSpan = document.getElementById('currentTrackIndexSpan');
            const totalTracksSpan = document.getElementById('totalTracksSpan');
            const playWithoutBtn = document.getElementById('playWithoutBtn');
            const timerDisplay = document.getElementById('timerDisplay');
            const playWithBtn = document.getElementById('playWithBtn');
            const nextTrackBtn = document.getElementById('nextTrackBtn');

            // Переменные состояния
            let currentTrackIndex = 0;           // 0-based индекс
            let timerInterval = null;
            let secondsLeft = 20;
            let withoutAudio = null;              // аудио для "без слов"
            let withAudio = null;                  // аудио для "со словами"
            let withoutPlaying = false;            // флаг, играет ли без слов
            let withPlaying = false;               // флаг, играет ли со словами

            totalTracksSpan.textContent = TOTAL_TRACKS;

            // ---------- Вспомогательные функции ----------
            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function resetTimer() {
                stopTimer();
                secondsLeft = 20;
                timerDisplay.textContent = secondsLeft;
            }

            function startTimer() {
                if (timerInterval) return;
                timerInterval = setInterval(() => {
                    secondsLeft -= 1;
                    timerDisplay.textContent = secondsLeft;
                    if (secondsLeft <= 0) {
                        stopTimer();
                        timerDisplay.textContent = "0";
                    }
                }, 1000);
            }

            // Остановить все аудио
            function stopAllAudio() {
                if (withoutAudio) {
                    withoutAudio.pause();
                    withoutAudio.currentTime = 0;
                    withoutPlaying = false;
                    playWithoutBtn.innerHTML = '▶ Без слов';
                }
                if (withAudio) {
                    withAudio.pause();
                    withAudio.currentTime = 0;
                    withPlaying = false;
                    playWithBtn.innerHTML = '▶ Со словами';
                }
            }

            // Загрузить трек по индексу (0-based)
            function loadTrack(index) {
                stopAllAudio();
                stopTimer();
                resetTimer();

                // Создаём аудиоэлементы с путями music/(index+1).mp3 и music-full/(index+1).mp3
                withoutAudio = new Audio(`music/${index+1}.mp3`);
                withAudio = new Audio(`music-full/${index+1}.mp3`);

                // Обработка окончания воспроизведения для сброса кнопок
                withoutAudio.addEventListener('ended', () => {
                    withoutPlaying = false;
                    playWithoutBtn.innerHTML = '▶ Без слов';
                });
                withAudio.addEventListener('ended', () => {
                    withPlaying = false;
                    playWithBtn.innerHTML = '▶ Со словами';
                });

                // Обработка ошибок загрузки
                withoutAudio.onerror = () => console.warn(`Ошибка загрузки music/${index+1}.mp3`);
                withAudio.onerror = () => console.warn(`Ошибка загрузки music-full/${index+1}.mp3`);

                // Обновляем номер трека в заголовке
                trackIndexSpan.textContent = index + 1;
            }

            // Управление воспроизведением без слов
            function toggleWithout() {
                if (!withoutAudio) return;

                if (withoutPlaying) {
                    // Поставить на паузу
                    withoutAudio.pause();
                    withoutPlaying = false;
                    playWithoutBtn.innerHTML = '▶ Без слов';
                } else {
                    // Начать воспроизведение (если на паузе, продолжим, если остановлен - с начала)
                    if (withoutAudio.paused) {
                        // Если аудио не в начале и на паузе, просто возобновляем
                        withoutAudio.play().catch(e => {
                            alert(`Не удалось воспроизвести music/${currentTrackIndex+1}.mp3. Проверьте наличие файла.`);
                        });
                    } else {
                        // Если остановлено (currentTime=0), начинаем заново
                        withoutAudio.currentTime = 0;
                        withoutAudio.play().catch(e => {
                            alert(`Не удалось воспроизвести music/${currentTrackIndex+1}.mp3. Проверьте наличие файла.`);
                        });
                    }
                    withoutPlaying = true;
                    playWithoutBtn.innerHTML = '⏸ Без слов';
                    // Запускаем таймер (если не запущен)
                    if (!timerInterval) {
                        startTimer();
                    }
                }
            }

            // Управление воспроизведением со словами
            function toggleWith() {
                if (!withAudio) return;

                if (withPlaying) {
                    withAudio.pause();
                    withPlaying = false;
                    playWithBtn.innerHTML = '▶ Со словами';
                } else {
                    if (withAudio.paused) {
                        withAudio.play().catch(e => {
                            alert(`Не удалось воспроизвести music-full/${currentTrackIndex+1}.mp3. Проверьте наличие файла.`);
                        });
                    } else {
                        withAudio.currentTime = 0;
                        withAudio.play().catch(e => {
                            alert(`Не удалось воспроизвести music-full/${currentTrackIndex+1}.mp3. Проверьте наличие файла.`);
                        });
                    }
                    withPlaying = true;
                    playWithBtn.innerHTML = '⏸ Со словами';
                }
            }

            // Переход к следующему треку
            function nextTrack() {
                if (currentTrackIndex + 1 < TOTAL_TRACKS) {
                    currentTrackIndex++;
                    loadTrack(currentTrackIndex);
                } else {
                    // Игра окончена
                    gameScreen.style.display = 'none';
                    finalScreen.style.display = 'block';
                }
            }

            // Начать игру заново
            function restartGame() {
                currentTrackIndex = 0;
                loadTrack(0);
                startScreen.style.display = 'none';
                gameScreen.style.display = 'block';
                finalScreen.style.display = 'none';
            }

            // ---------- Обработчики событий ----------
            startBtn.addEventListener('click', restartGame);
            playAgainBtn.addEventListener('click', restartGame);

            playWithoutBtn.addEventListener('click', toggleWithout);
            playWithBtn.addEventListener('click', toggleWith);

            // Кнопка "Следующий трек"
            nextTrackBtn.addEventListener('click', nextTrack);

            // Инициализация: скрываем игровой экран, показываем стартовый
            startScreen.style.display = 'block';
            gameScreen.style.display = 'none';
            finalScreen.style.display = 'none';
        })();
    </script>
</body>
</html>
